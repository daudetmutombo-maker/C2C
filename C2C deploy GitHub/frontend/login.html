<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2S - Redirection</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <meta http-equiv="refresh" content="0; url=index.html">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3rem 3.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 1.5rem;
        }

        .logo-c2s {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1d1d1f;
            letter-spacing: -2px;
        }

        .logo-c2s span {
            color: #ff453a;
        }

        h1 {
            color: #1d1d1f;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        p {
            color: #86868b;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            color: #1d1d1f;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            color: #1d1d1f;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #111c44;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(17, 28, 68, 0.08);
        }

        .form-group input::placeholder {
            color: #86868b;
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: #111c44;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(17, 28, 68, 0.2);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 1.5rem;
            color: #86868b;
            font-size: 0.72rem;
        }

        #error-msg {
            color: #ff453a;
            font-size: 0.82rem;
            margin-top: 0.8rem;
            display: none;
            font-weight: 500;
        }

        .password-container {
            position: relative;
        }

        #togglePassword {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #86868b;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        #togglePassword:hover {
            color: #1d1d1f;
        }

    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="img/favicon.svg" alt="Logo C2C" style="width: 80px; height: 80px; margin-bottom: 10px;">
            <div class="logo-c2s">C<span>2</span>C</div>
        </div>
        <h1>Accès Sécurisé</h1>
        <p>Veuillez décliner votre identité pour accéder au Pilotage Stratégique.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="ex: admin_it" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-container">
                    <input type="password" id="password" required>
                    <div id="togglePassword">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-login">S'identifier</button>
            <div id="error-msg">Identifiants incorrects. Accès refusé.</div>
        </form>

        <div class="footer-note">
            Protocoles de sécurité C2S actifs (AES-256)
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const API_BASE_URL = (function() {
            const saved = localStorage.getItem('c2s_api_url');
            return saved || "http://127.0.0.1:8000/api";
        })();

        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle Icon
            if (type === 'text') {
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('c2s_token', data.token);
                    localStorage.setItem('c2s_user_role', data.user.role);
                    localStorage.setItem('c2s_username', data.user.username);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error("Erreur de connexion:", error);
                errorMsg.innerText = "Serveur indisponible.";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
